<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Sora:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <title>PrepBrief — Walk Into Your Interview Ready</title>
    <meta
      name="description"
      content="Walk into your interview knowing what they'll ask. A personalized prep brief built from your resume and their job description — predicted questions, talking points, and company context. Ready in 60 seconds."
    />
    <meta
      name="keywords"
      content="interview prep, interview questions to ask, tell me about yourself interview, company research, interview talking points, interview readiness"
    />
    <meta
      property="og:title"
      content="PrepBrief — Walk into your interview knowing what they'll ask"
    />
    <meta
      property="og:description"
      content="A brief built from your resume and their job description — not generic advice. Predicted questions, talking points, and company context. Ready in 60 seconds."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prepbrief.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PrepBrief — Interview prep that makes you feel ready" />
    <meta
      name="twitter:description"
      content="Don't reschedule. Get ready. Personalized interview prep from your resume and their job description — in 60 seconds."
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "PrepBrief",
        "applicationCategory": "BusinessApplication",
        "description": "Interview prep that generates personalized briefs from your resume and a job posting URL — predicted questions, talking points, and company context in 60 seconds",
        "offers": [
          {
            "@type": "Offer",
            "name": "Free",
            "price": "0",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Job Seeker",
            "price": "9.00",
            "priceCurrency": "USD",
            "billingDuration": "P1M"
          },
          {
            "@type": "Offer",
            "name": "Intensive",
            "price": "19.00",
            "priceCurrency": "USD",
            "billingDuration": "P1M"
          }
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How long does it take to get interview-ready?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "PrepBrief builds a personalized prep brief from your resume and the job posting in about 60 seconds — predicted questions, talking points, and company context so you walk in feeling ready."
            }
          },
          {
            "@type": "Question",
            "name": "What should I know before an interview?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You should know what they're likely to ask, how to frame your background for this role, smart questions to ask them, and what the company is focused on right now. PrepBrief generates all of this from your resume and the job description."
            }
          },
          {
            "@type": "Question",
            "name": "How do I answer 'tell me about yourself' in an interview?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Lead with your most relevant background, thread through the skills this role needs, and close by connecting to why you're excited about this specific company. PrepBrief gives you structured talking points — not a word-for-word script — built from your resume and the job description."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
