    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "PrepBrief",
        "applicationCategory": "BusinessApplication",
        "description": "Interview prep tool that generates personalized company briefs and predicted interview questions from a job posting URL in 60 seconds",
        "offers": [
          {
            "@type": "Offer",
            "name": "Free",
            "price": "0",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Job Seeker",
            "price": "9.00",
            "priceCurrency": "USD",
            "billingDuration": "P1M"
          },
          {
            "@type": "Offer",
            "name": "Intensive",
            "price": "19.00",
            "priceCurrency": "USD",
            "billingDuration": "P1M"
          }
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How long does it take to research a company before an interview?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Most candidates spend 30-60 minutes researching across multiple sites including the company website, LinkedIn, Glassdoor, and Crunchbase. PrepBrief generates a complete interview brief in 60 seconds."
            }
          },
          {
            "@type": "Question",
            "name": "What should I know about a company before an interview?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You should know what the company does, the problem it solves, their current strategic focus, and how your background maps to the role. PrepBrief generates all of this automatically from the job posting URL."
            }
          },
          {
            "@type": "Question",
            "name": "How do I answer 'tell me about yourself' in an interview?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Structure your answer as open, middle, close: lead with your most relevant background, thread through the skills this role needs, and close by connecting to why you're excited about this specific company. PrepBrief builds this framework from your resume and the job description."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
